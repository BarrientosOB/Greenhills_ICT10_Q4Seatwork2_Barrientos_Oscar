<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <title>Classmate System</title>
    <style>
        .box { 
            max-width: 400px; 
            margin: auto; 
            padding: 20px; 
            border: 1px solid #ccc;
        }

        input { width: 100%; margin-bottom: 10px; padding: 8px; }
        
        button { width: 48%; padding: 10px; }
        
        .btn-add { 
            background-color: yellow; 
            color: black; 
        }

        .btn-show { 
            background-color: purple; 
            color: white; 
        }

        .item { border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2> Grade 10 Classmates System</h2>
        <p>Add and view your classmates easily</p>
        
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="section" placeholder="Section">
        <input type="text" id="subject" placeholder="Favorite Subject">
        
        <div style="display: flex; justify-content: space-between;">
            <button class="btn-add" py-click="add_classmate">Add Classmate</button>
            <button class="btn-show" py-click="show_list">Show List</button>
        </div>

        <div id="output-list">
            <strong>Classmate List</strong>
            <div id="display-area"></div>
        </div>
    </div>

    <script type="py" src="main.py" config='{"packages":["pyscript"]}'></script>
</body>
</html>
